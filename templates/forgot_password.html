{% extends "base.html" %}
{% block content %}
<div class="container" style="max-width: 400px;">
    <h2 style="text-align: center; color: var(--dk-navy);">비밀번호 재설정</h2>
    <p style="text-align: center; color: #666; font-size: 0.9rem; margin-bottom: 20px;">가입할 때 입력한 정보를 확인하고<br>새로운 비밀번호를 설정합니다.</p>
    
    {% if error %}
    <div class="alert error" style="color: red; margin-bottom: 15px;">{{ error }}</div>
    {% endif %}

    <div class="card">
        <form action="/forgot-password" method="post">
            <div class="input-group" style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px;">학번</label>
                <input type="text" name="student_id" placeholder="예: 32xxxxxx" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
            </div>
            
            <div class="input-group" style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px;">이름</label>
                <input type="text" name="name" placeholder="가입된 이름" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
            </div>

            <div class="input-group" style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 5px;">새로운 비밀번호</label>
                <input type="password" name="new_password" placeholder="변경할 비밀번호 입력" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
            </div>
            
            <button type="submit" class="btn-primary" style="width: 100%; padding: 12px; background-color: #e83e8c; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;">비밀번호 변경하기</button>
        </form>
    </div>
    
    <div style="text-align: center; margin-top: 20px;">
        <a href="/" style="color: #666; text-decoration: none;">로그인 화면으로 돌아가기</a>
    </div>
</div>
{% endblock %}
